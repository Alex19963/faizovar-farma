<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Faizovar farma</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  

<div id="historyScreen" class="cart-screen hidden">

  <div class="cart-head history-head">

    <!-- BACK (как в корзине) -->
    <button id="historyBack" class="cart-back" type="button" onclick="closeHistoryScreen()" aria-label="Назад"></button>

    <!-- FILTERS (год/месяц/день как белые поля) -->
<div class="history-filters">

  <!-- ГОД -->
  <div class="hist-dd">
    <select class="history-select" id="histYear" aria-label="Год">
      <option value="2026">2026</option>
      <option value="2025">2025</option>
      <option value="2024">2024</option>
    </select>
  </div>

  <!-- МЕСЯЦ -->
  <div class="hist-dd">
    <select class="history-select" id="histMonth" aria-label="Месяц">
      <option value="">Месяц</option>
      <option value="01">01</option><option value="02">02</option><option value="03">03</option>
      <option value="04">04</option><option value="05">05</option><option value="06">06</option>
      <option value="07">07</option><option value="08">08</option><option value="09">09</option>
      <option value="10">10</option><option value="11">11</option><option value="12">12</option>
    </select>
  </div>

  <!-- ДЕНЬ -->
  <div class="hist-dd">
    <select class="history-select" id="histDay" aria-label="День">
      <option value="">День</option>
      <option value="01">01</option><option value="02">02</option><option value="03">03</option>
      <option value="04">04</option><option value="05">05</option><option value="06">06</option>
      <option value="07">07</option><option value="08">08</option><option value="09">09</option>
      <option value="10">10</option><option value="11">11</option><option value="12">12</option>
      <option value="13">13</option><option value="14">14</option><option value="15">15</option>
      <option value="16">16</option><option value="17">17</option><option value="18">18</option>
      <option value="19">19</option><option value="20">20</option>
      <option value="21">21</option><option value="22">22</option><option value="23">23</option>
      <option value="24">24</option><option value="25">25</option>
      <option value="26">26</option><option value="27">27</option><option value="28">28</option>
      <option value="29">29</option><option value="30">30</option><option value="31">31</option>
    </select>
  </div>

</div>


    <!-- PILL: COUNT (как count в корзине) -->
<div class="nav-action nav-pill cart-head-count history-count" aria-label="Количество заказов">
  <span class="nav-circle" aria-hidden="true">
    <svg class="nav-ic nav-ic-stroke" viewBox="0 0 24 24" aria-hidden="true">
      <line x1="8" y1="6" x2="21" y2="6"></line>
      <line x1="8" y1="12" x2="21" y2="12"></line>
      <line x1="8" y1="18" x2="21" y2="18"></line>
      <circle cx="4" cy="6" r="1.5"></circle>
      <circle cx="4" cy="12" r="1.5"></circle>
      <circle cx="4" cy="18" r="1.5"></circle>
    </svg>
  </span>
  <span class="cart-count-text">
    <span id="histOrdersCount">0</span>
  </span>
</div>


    <!-- PILL: TOTAL SUM (как cart pill) -->
<button class="nav-action nav-pill history-total" type="button" aria-label="Общая сумма">
  <span class="nav-circle" aria-hidden="true">
    <svg class="nav-ic nav-ic-stroke" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M3 7h18v10H3z"></path>
      <path d="M16 11h3v2h-3z"></path>
      <path d="M3 7l3-3h12l3 3"></path>
    </svg>
  </span>
  <span class="nav-cart-sum">
    <span id="histTotalSum">0</span> c
  </span>
</button>


  </div>

  <div class="products-scroll cart-scroll">
    <div class="products-wrap">
      <div id="historyList"></div>
    </div>
  </div>

</div>





<!-- NAVIGATION + SEARCH (FIXED TOP) -->
<header class="nav-wrapper">
  <div class="nav-card">

    <!-- TOP ROW (логотип + иконки) -->
    <div class="nav-top">
      <div class="nav-left">
        <div class="nav-logo" aria-label="Логотип">
          <img src="img/logo1.png" alt="Faizovar farma">
        </div>
      </div>

      <div class="nav-right">

        <!-- HISTORY -->
<button class="nav-action nav-pill nav-history" type="button" onclick="openHistoryScreen()" aria-label="История заказов">
  <span class="nav-circle" aria-hidden="true">
    <svg class="nav-ic nav-ic-stroke" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M12 8v5l3 2"></path>
      <path d="M21 12a9 9 0 1 1-3.1-6.7"></path>
      <path d="M21 3v6h-6"></path>
    </svg>
  </span>
  <span class="nav-history-text">История заказов</span>
</button>


        <!-- CART -->
        <button class="nav-action nav-pill nav-cart" type="button" onclick="openCartScreen()" aria-label="Корзина">
          <span class="nav-circle" aria-hidden="true">
            <svg class="nav-ic" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M7 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM7.17 14h9.58c.75 0 1.41-.41 1.75-1.03l3.24-6.16A1 1 0 0 0 21.86 5H5.21L4.27 2H1v2h2l3.6 7.59-1.35 2.44C4.52 14.37 5.48 16 7 16h12v-2H7.42c-.14 0-.25-.11-.25-.25z"/>
            </svg>
          </span>

          <span class="nav-cart-sum">
            <span id="cartTotalBar">0</span> c
          </span>
        </button>

        <!-- PROFILE -->
        <button type="button" class="nav-action nav-pill account-btn" aria-label="Профиль" onclick="window.handleProfileButtonClick(event)">

          <span class="nav-circle" aria-hidden="true">
            <svg class="nav-ic" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 12c2.76 0 5-2.24 5-5S14.76 2 12 2 7 4.24 7 7s2.24 5 5 5zm0 2c-3.33 0-10 1.67-10 5v3h20v-3c0-3.33-6.67-5-10-5z"/>
            </svg>
          </span>
        </button>

      </div>
    </div>

    <!-- SEARCH ROW (внутри навигации) -->
    <div class="nav-search">
      <div class="search-shell">
        <div class="search-row">

          <!-- MODE -->
          <div class="search-dd" id="searchModeDD">
            <input type="hidden" id="searchMode" value="name">
            <button type="button" class="search-dd-btn" id="searchModeBtn" aria-haspopup="listbox" aria-expanded="false">
              <span class="search-dd-text" id="searchModeText">По названию</span>
              <span class="search-dd-arrow" aria-hidden="true"></span>
            </button>

            <div class="search-dd-menu" id="searchModeMenu" role="listbox" aria-label="Режим поиска">
              <button type="button" class="search-dd-item is-active" role="option" data-value="name">По названию</button>
              <button type="button" class="search-dd-item" role="option" data-value="manufacturer">По производителю</button>
            </div>
          </div>

          <!-- CATEGORY -->
          <div class="search-dd" id="categoryDD">
            <input type="hidden" id="categorySelect" value="">
            <button type="button" class="search-dd-btn" id="categoryBtn" aria-haspopup="listbox" aria-expanded="false">
              <span class="search-dd-text" id="categoryText">Категория</span>
              <span class="search-dd-arrow" aria-hidden="true"></span>
            </button>

            <div class="search-dd-menu" id="categoryMenu" role="listbox" aria-label="Категория">
              <button type="button" class="search-dd-item is-active" role="option" data-value="">Все категории</button>
              <button type="button" class="search-dd-item" role="option" data-value="Таблетки">Таблетки</button>
              <button type="button" class="search-dd-item" role="option" data-value="Капсулы">Капсулы</button>
              <button type="button" class="search-dd-item" role="option" data-value="Сироп">Сироп</button>
              <button type="button" class="search-dd-item" role="option" data-value="Раствор">Раствор</button>
              <button type="button" class="search-dd-item" role="option" data-value="Инъекции">Инъекции</button>
              <button type="button" class="search-dd-item" role="option" data-value="Мазь">Мазь</button>
              <button type="button" class="search-dd-item" role="option" data-value="Крем">Крем</button>
              <button type="button" class="search-dd-item" role="option" data-value="Гель">Гель</button>
              <button type="button" class="search-dd-item" role="option" data-value="Порошок">Порошок</button>
            </div>
          </div>

          <!-- INPUT -->
          <div class="search-input">
            <span class="search-ic" aria-hidden="true">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M10 18a8 8 0 1 1 5.3-14A8 8 0 0 1 10 18zm11 3-6-6"></path>
              </svg>
            </span>
            <input type="text" id="searchInput" placeholder="Введите запрос..." autocomplete="off">
          </div>

        </div>
      </div>
    </div>

  </div>
</header>

<div class="content">
  <div class="products-mask" aria-hidden="true"></div>

  <div class="products-scroll">
    <div class="products-wrap">
      <div id="productList"></div>
    </div>
  </div>
</div>


<!-- IMAGE OVERLAY (PREVIEW) -->
<div id="imageOverlay" class="img-overlay" onclick="closeImage()" style="display:none;">
  <div class="img-modal" onclick="event.stopPropagation()">
    <button class="img-close" type="button" onclick="closeImage()" aria-label="Закрыть">×</button>
    <img id="imagePreview" alt="">
  </div>
</div>

<!-- CART (SAME DESIGN AS PRODUCTS) -->
<div id="cartScreen" class="cart-screen hidden">
<div class="cart-head">

  <!-- BACK -->
  <button id="cartBack" class="cart-back" type="button" onclick="closeCartScreen()" aria-label="Назад"></button>

  <!-- SEARCH (внутри корзины) -->
  <div class="cart-search">
    <span class="cart-search-ic" aria-hidden="true">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M10 18a8 8 0 1 1 5.3-14A8 8 0 0 1 10 18zm11 3-6-6"></path>
      </svg>
    </span>
    <input id="cartSearchInput" type="text" placeholder="Поиск в корзине..." autocomplete="off">
  </div>


<!-- CART BUTTON (как на главной) -->
<button class="nav-action nav-pill nav-cart cart-head-cart" type="button" aria-label="Корзина">
  <span class="nav-circle" aria-hidden="true">
    <svg class="nav-ic" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M7 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM7.17 14h9.58c.75 0 1.41-.41 1.75-1.03l3.24-6.16A1 1 0 0 0 21.86 5H5.21L4.27 2H1v2h2l3.6 7.59-1.35 2.44C4.52 14.37 5.48 16 7 16h12v-2H7.42c-.14 0-.25-.11-.25-.25z"/>
    </svg>
  </span>

  <span class="nav-cart-sum">
    <span id="cartTotal">0</span> c
  </span>
</button>


  <!-- COUNT BUTTON (такая же, но количество) -->
<div class="nav-action nav-pill cart-head-count" aria-label="Количество товаров">
  <span class="nav-circle" aria-hidden="true">
    <img src="img/list-count.svg" alt="" class="count-icon">
  </span>

  <span class="cart-count-text">
    <span id="cartItemsCount">0</span>
  </span>
</div>





</div>


  <div class="products-scroll cart-scroll">
    <div class="products-wrap">
      <div id="cartItems"></div>
    </div>
  </div>

<!-- FOOTER BUTTON (ширина как у градиента) -->
<div class="cart-footer">
  <div class="cart-footer-inner">
    <button class="order-btn" type="button">Отправить заявку</button>
    <div id="orderNotice" class="order-notice hidden" role="status" aria-live="polite">
  <div class="order-notice-ic">✓</div>
  <div class="order-notice-txt">
    <div class="order-notice-title">Заявка отправлена</div>
    <div class="order-notice-sub">С вами свяжутся для уточнения заказа</div>
  </div>
</div>
  </div>
</div>

</div>

<div id="profileScreen" class="profile-screen hidden" onclick="closeProfileScreen()">
  <div class="profile-box" onclick="event.stopPropagation()">

    <!-- КНОПКА ЗАКРЫТЬ (справа сверху) -->
    <button class="profile-close" type="button" onclick="closeProfileScreen()" aria-label="Закрыть">×</button>

    <h2>Профиль клиента</h2>

<div class="profile-fields">

  <div class="profile-field">
    <span class="pf-ic" aria-hidden="true">
      <!-- user -->
      <svg viewBox="0 0 24 24"><path d="M12 12c2.76 0 5-2.24 5-5S14.76 2 12 2 7 4.24 7 7s2.24 5 5 5zm0 2c-3.33 0-10 1.67-10 5v3h20v-3c0-3.33-6.67-5-10-5z"/></svg>
    </span>
    <div class="pf-body">
      <div class="pf-label">ФИО</div>
      <div class="pf-value" id="pfFullName">—</div>
    </div>
  </div>

  <div class="profile-field">
    <span class="pf-ic" aria-hidden="true">
      <!-- phone -->
      <svg viewBox="0 0 24 24"><path d="M6.62 10.79a15.05 15.05 0 0 0 6.59 6.59l2.2-2.2a1 1 0 0 1 1.01-.24c1.12.37 2.33.57 3.58.57a1 1 0 0 1 1 1V20a1 1 0 0 1-1 1C10.07 21 3 13.93 3 5a1 1 0 0 1 1-1h3.5a1 1 0 0 1 1 1c0 1.25.2 2.46.57 3.58a1 1 0 0 1-.24 1.01l-2.21 2.2z"/></svg>
    </span>
    <div class="pf-body">
      <div class="pf-label">Телефон</div>
      <div class="pf-value" id="pfPhone">—</div>
    </div>
  </div>

  <div class="profile-field">
    <span class="pf-ic" aria-hidden="true">
      <!-- mail -->
      <svg viewBox="0 0 24 24"><path d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zm0 4-8 5L4 8V6l8 5 8-5v2z"/></svg>
    </span>
    <div class="pf-body">
      <div class="pf-label">Email</div>
      <div class="pf-value" id="pfEmail">—</div>
    </div>
  </div>

  <div class="profile-field">
    <span class="pf-ic" aria-hidden="true">
      <!-- pharmacy/building -->
      <svg viewBox="0 0 24 24"><path d="M3 21V8l9-5 9 5v13h-6v-7H9v7H3zm8-9h2V9h-2v3zm0 0"/></svg>
    </span>
    <div class="pf-body">
      <div class="pf-label">Аптека / адрес</div>
      <div class="pf-value" id="pfPharmacy">—</div>
    </div>
  </div>

</div>


    <!-- УБРАЛИ: Редактировать / Сохранить -->
    <button id="profileLogoutBtn">Выйти из профиля</button>

  </div>
</div>

<!-- QUANTITY MODAL (для добавления товара в корзину) -->
<div id="qtyModal" class="qty-modal hidden" onclick="closeQtyModal()">
  <div class="qty-modal-box" onclick="event.stopPropagation()">
    <h3 id="qtyModalTitle">Название товара</h3>
    
    <div class="qty-modal-sub">
      Цена: <b id="qtyPrice">—</b>с &nbsp; Общая сумма: <b id="qtyTotal">—</b>
    </div>
    
    <div class="qty-modal-controls">
      <button id="qtyMinusBtn" class="qty-btn qty-minus" type="button">−</button>
      <div id="qtyDisplay" class="qty-display">1</div>
      <button id="qtyPlusBtn" class="qty-btn qty-plus" type="button">+</button>
      <button id="qtyConfirmBtn" class="qty-modal-confirm" type="button">Добавить в корзину</button>
    </div>
  </div>
</div>


<script src="js/app.js?v=7.8"></script>
</body>
</html>
